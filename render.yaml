# Render Blueprint configuration for BookMyShow Clone microservices architecture
# Documentation: https://render.com/docs/blueprints

databases:
  - name: postgres-db
    databaseName: showtime_auth
    user: postgres
    plan: free

services:
  # 1. Managed Redis Caching Service
  - type: redis
    name: redis-cache
    plan: free
    ipAllowList: [] # Access restricted to services inside the Render private network

  # 2. MongoDB Service (Dockerized container)
  - type: pserv
    name: mongo-db
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.mongo
    plan: free
    # Note: Free tier on Render does not support persistent disks. 
    # To persist database data, upgrade to a paid instance tier and uncomment the block below.
    # Otherwise, MongoDB will run in ephemeral mode.
    # Alternatively, you can use MongoDB Atlas (free tier) and set the connection URI environment variables.
    # disk:
    #   name: mongo-data
    #   mountPath: /data/db
    #   sizeGB: 1

  # 3. Eureka Discovery Service
  - type: pserv
    name: discovery-service
    env: docker
    dockerContext: ./ShowTime-Workspace/Show_TIme
    dockerfilePath: Dockerfile
    plan: free

  # 4. Authentication Service
  - type: pserv
    name: auth-service
    env: docker
    dockerContext: ./ShowTime-Workspace/Auth-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${POSTGRES_DB_HOST}:${POSTGRES_DB_PORT}/${POSTGRES_DB_DATABASE}
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: postgres-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: postgres-db
          property: password
      - key: POSTGRES_DB_HOST
        fromDatabase:
          name: postgres-db
          property: host
      - key: POSTGRES_DB_PORT
        fromDatabase:
          name: postgres-db
          property: port
      - key: POSTGRES_DB_DATABASE
        fromDatabase:
          name: postgres-db
          property: database
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        value: http://eureka:eureka123@discovery-service:8761/eureka/

  # 5. Movie Catalog Service
  - type: pserv
    name: movie-catalog-service
    env: docker
    dockerContext: ./ShowTime-Workspace/Show_time_Movie_Catlog_service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATA_MONGODB_HOST
        value: mongo-db
      - key: SPRING_DATA_MONGODB_PORT
        value: "27017"
      - key: SPRING_DATA_MONGODB_DATABASE
        value: showtime_movies
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        value: http://eureka:eureka123@discovery-service:8761/eureka/

  # 6. Show Service
  - type: pserv
    name: show-service
    env: docker
    dockerContext: ./ShowTime-Workspace/Show_time_Show_Sevrvice
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATA_MONGODB_HOST
        value: mongo-db
      - key: SPRING_DATA_MONGODB_PORT
        value: "27017"
      - key: SPRING_DATA_MONGODB_DATABASE
        value: showtime_shows
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        value: http://eureka:eureka123@discovery-service:8761/eureka/

  # 7. API Gateway
  - type: pserv
    name: api-gateway
    env: docker
    dockerContext: ./ShowTime-Workspace/Show_time_Api_gateway
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATA_REDIS_HOST
        fromRedis:
          name: redis-cache
          property: host
      - key: SPRING_DATA_REDIS_PORT
        fromRedis:
          name: redis-cache
          property: port
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        value: http://eureka:eureka123@discovery-service:8761/eureka/

  # 8. React Frontend (served by Nginx reverse proxy)
  # 8. React Frontend (served by Nginx reverse proxy)
- type: web
  name: react-frontend
  env: docker
  dockerContext: .
  dockerfilePath: Dockerfile
  plan: free
  envVars:
    - key: PORT
      value: 3000
