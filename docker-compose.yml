version: '3.8'

services:
  # 1. PostgreSQL Database for Auth-service
  postgres-db:
    image: postgres:17-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "963270"
      POSTGRES_DB: showtime_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. MongoDB Database for Catalog & Show Services
  mongo-db:
    image: mongo:7.0
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 3. Redis Caching for Rate Limiting in API Gateway
  redis-cache:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 4. Eureka Discovery Service
  discovery-service:
    build:
      context: ./ShowTime-Workspace/Show_TIme
      dockerfile: Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 5. Authentication Service
  auth-service:
    build:
      context: ./ShowTime-Workspace/Auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/showtime_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "963270"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:eureka123@discovery-service:8761/eureka/
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  # 6. Movie Catalog Service
  movie-catalog-service:
    build:
      context: ./ShowTime-Workspace/Show_time_Movie_Catlog_service
      dockerfile: Dockerfile
    container_name: movie-catalog-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_HOST: mongo-db
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: showtime_movies
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:eureka123@discovery-service:8761/eureka/
    depends_on:
      discovery-service:
        condition: service_healthy

  # 7. Show Service
  show-service:
    build:
      context: ./ShowTime-Workspace/Show_time_Show_Sevrvice
      dockerfile: Dockerfile
    container_name: show-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_HOST: mongo-db
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: showtime_shows
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:eureka123@discovery-service:8761/eureka/
    depends_on:
      discovery-service:
        condition: service_healthy

  # 8. API Gateway
  api-gateway:
    build:
      context: ./ShowTime-Workspace/Show_time_Api_gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis-cache
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:eureka123@discovery-service:8761/eureka/
    depends_on:
      redis-cache:
        condition: service_started
      discovery-service:
        condition: service_healthy

  # 9. React Frontend served via Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: react-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  mongo_data:
  redis_data:
